name: Publish PclCSharp Release

# Trigger on a version tag push (e.g. v1.2.3) or manually via the Actions UI.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0) – a tag v<version> will be created'
        required: true
        default: '0.0.0'

# Allow only one publish run at a time for the same ref to avoid race conditions
# on the GitHub Release. Ongoing runs are NOT cancelled – we wait for them to
# finish so we don't end up with a half-published release.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub Releases and upload assets
  actions: write    # vcpkg GitHub Actions binary caching

jobs:
  publish:
    runs-on: windows-latest
    env:
      # Pinned vcpkg release tag – keep in sync with build.yml.
      # Bump this string to upgrade all PCL/VTK/Boost packages.
      VCPKG_COMMIT: '2026.04.27'
      # Use the GitHub Actions cache backend for vcpkg binary packages.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
    # -----------------------------------------------------------------------
    # Source checkout
    # -----------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # -----------------------------------------------------------------------
    # Resolve version string from tag name or workflow_dispatch input
    # -----------------------------------------------------------------------
    - name: Resolve version
      id: version
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
          $ver = '${{ github.event.inputs.version }}'
          $tag = "v$ver"
        } else {
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '^v', ''
        }
        Write-Host "Tag    : $tag"
        Write-Host "Version: $ver"
        "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
        "tag=$tag"     | Out-File -Append $env:GITHUB_OUTPUT

    # -----------------------------------------------------------------------
    # Disk / cache preparation (mirrors build.yml)
    # -----------------------------------------------------------------------

    # Free disk space first so there is room to restore caches below.
    - name: Free disk space
      shell: pwsh
      run: |
        $dirsToRemove = @(
          'C:\Android',
          'C:\hostedtoolcache\windows\go',
          'C:\hostedtoolcache\windows\Python',
          'C:\hostedtoolcache\windows\node',
          'C:\hostedtoolcache\windows\Ruby',
          'C:\hostedtoolcache\windows\Java',
          'C:\hostedtoolcache\windows\julia',
          'C:\Miniconda',
          'C:\Strawberry',
          'C:\ProgramData\Miniconda3'
        )
        foreach ($dir in $dirsToRemove) {
          if (Test-Path $dir) {
            Write-Host "Removing $dir ..."
            Remove-Item -Path $dir -Recurse -Force -ErrorAction SilentlyContinue
          }
        }
        Write-Host "`nDisk space after cleanup:"
        Get-PSDrive C | Select-Object Used, Free

    # Cache the vcpkg downloads directory to avoid re-downloading source archives.
    # Key is tied to the pinned vcpkg commit so a version bump invalidates it.
    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\downloads
        key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}
        restore-keys: |
          vcpkg-downloads-${{ runner.os }}-

    # Cache the fully-installed vcpkg tree. A cache hit lets us skip the entire
    # vcpkg install step (which takes 30–90 min on a cold runner).
    - name: Cache vcpkg installed packages
      id: vcpkg-installed-cache
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\installed
        key: vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-pcl-vtk-x64-windows
        restore-keys: |
          vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-

    # -----------------------------------------------------------------------
    # Toolchain setup
    # -----------------------------------------------------------------------
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Ninja
      shell: pwsh
      run: choco install ninja -y

    - name: Export GitHub Actions cache env vars for vcpkg
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    # Pin the runner's pre-installed vcpkg to the exact release tag declared in
    # VCPKG_COMMIT. Always runs (even on cache hit) to export VCPKG_ROOT.
    - name: Pin vcpkg to fixed commit
      shell: pwsh
      run: |
        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        Write-Host "Pinning vcpkg to $env:VCPKG_COMMIT ..."
        # Fetch only the specific release tag to keep the network transfer small.
        git -C $vcpkgRoot fetch origin "refs/tags/$($env:VCPKG_COMMIT):refs/tags/$($env:VCPKG_COMMIT)" --depth 1
        git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
        # Rebuild vcpkg.exe so it matches the pinned source tree.
        & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
        # Expose the vcpkg root for all subsequent steps.
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -Append $env:GITHUB_ENV

    # -----------------------------------------------------------------------
    # Build PCL from source via vcpkg (binary-cached after first run)
    # -----------------------------------------------------------------------

    # Only run the full PCL install when the installed-package cache was not
    # restored above. On a cache hit the installed tree is already in place.
    - name: Build and install PCL from source via vcpkg
      if: steps.vcpkg-installed-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Write-Host "vcpkg root: $env:VCPKG_ROOT"
        & "$env:VCPKG_ROOT\vcpkg.exe" install "pcl[vtk]:x64-windows" `
            --no-print-usage `
            --clean-buildtrees-after-build `
            --clean-packages-after-build

    # -----------------------------------------------------------------------
    # Build C++ DLLs
    # -----------------------------------------------------------------------
    - name: Configure C++ projects with CMake
      shell: pwsh
      run: |
        cmake -S . -B build `
          -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build C++ DLLs with CMake
      shell: pwsh
      run: cmake --build build --config Release --parallel

    # -----------------------------------------------------------------------
    # Build .NET wrapper libraries
    # -----------------------------------------------------------------------
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build .NET solution
      shell: pwsh
      run: |
        msbuild "src\PclSharpWrapper\PclSharpWrapper.sln" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /m `
          /v:minimal

    # -----------------------------------------------------------------------
    # Build WpfHelixDemo (self-contained, win-x64)
    # -----------------------------------------------------------------------
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish WpfHelixDemo (self-contained)
      shell: pwsh
      run: |
        dotnet publish "demo\PclCSharpDemo\WpfHelixDemo\WpfHelixDemo.csproj" `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -o "demo\PclCSharpDemo\WpfHelixDemo\publish"

    # -----------------------------------------------------------------------
    # Collect PCL/VTK/Boost runtime DLLs into depend/x64
    # -----------------------------------------------------------------------
    - name: Collect runtime DLLs into depend/x64
      shell: pwsh
      run: |
        $vcpkgBin = "$env:VCPKG_ROOT\installed\x64-windows\bin"
        $destDir  = "depend\x64"
        New-Item -ItemType Directory -Force -Path $destDir | Out-Null

        Write-Host "Copying PCL DLLs..."
        Get-ChildItem $vcpkgBin -Filter "pcl_*.dll" |
          Copy-Item -Destination $destDir -Force

        Write-Host "Copying dependency DLLs (Boost, FLANN, qhull, zlib, lz4, lzma, VTK, image libs)..."
        $patterns = @("boost_*.dll", "flann_cpp*.dll", "qhull*.dll",
                      "zlib1.dll", "lz4*.dll", "lzma*.dll", "zstd.dll", "bz2.dll", "tbb*.dll",
                      "vtk*.dll",
                      "libpng16.dll", "libjpeg*.dll", "jpeg*.dll", "libtiff*.dll", "tiff.dll",
                      "freetype.dll", "libexpat.dll", "double-conversion.dll",
                      "fmt*.dll", "pugixml.dll", "verdict.dll")
        foreach ($pat in $patterns) {
          Get-ChildItem $vcpkgBin -Filter $pat -ErrorAction SilentlyContinue |
            Copy-Item -Destination $destDir -Force
        }

        # Also copy any vcpkg applocal dependencies that the CMake build placed
        # alongside the built DLLs in bin/ (e.g. z.dll, zlib1.dll, etc.).
        # vcpkg's VCPKG_APPLOCAL_DEPS feature copies required runtime DLLs to
        # the target's output directory, so collecting from bin/ ensures nothing
        # is missed even when a dependency uses a non-standard DLL name.
        Write-Host "Copying vcpkg applocal dependencies from bin/..."
        if (Test-Path "bin") {
          Get-ChildItem "bin" -Filter "*.dll" |
            Where-Object { $_.Name -notmatch "^(PclDll|PointCloudDll)\.dll$" } |
            Copy-Item -Destination $destDir -Force
        }

        Write-Host "`nRuntime DLLs collected in $destDir :"
        Get-ChildItem $destDir | Sort-Object Name | Select-Object Name

    # -----------------------------------------------------------------------
    # Package runtime / lib / demo into zip archives
    # -----------------------------------------------------------------------
    - name: Create release packages
      shell: pwsh
      run: |
        $ver = '${{ steps.version.outputs.version }}'
        .\pack.ps1 -Version $ver -OutDir dist

    # -----------------------------------------------------------------------
    # Create GitHub Release and upload the three zip assets
    # -----------------------------------------------------------------------
    - name: Create GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $ver = '${{ steps.version.outputs.version }}'
        $tag = '${{ steps.version.outputs.tag }}'

        # Mark pre-releases (tags that contain a hyphen, e.g. v1.0.0-beta.1)
        $preReleaseFlag = if ($tag -match '-') { '--prerelease' } else { $null }

        $releaseArgs = @(
          'release', 'create', $tag,
          '--title', "PclCSharp $ver",
          '--generate-notes',
          "dist/runtime-$ver-win-x64.zip",
          "dist/lib-$ver.zip",
          "dist/demo-$ver-win-x64.zip"
        )
        if ($preReleaseFlag) { $releaseArgs += $preReleaseFlag }

        gh @releaseArgs

    # -----------------------------------------------------------------------
    # Upload packages as Actions artifacts (useful for debugging / re-publish)
    # -----------------------------------------------------------------------
    - name: Upload release packages as workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-packages-${{ steps.version.outputs.version }}
        path: dist/*.zip
        if-no-files-found: warn
