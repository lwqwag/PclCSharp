name: Build PclCSharp with PCL 1.14.1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download PCL 1.14.1 AllInOne installer
      run: |
        $url = "https://github.com/PointCloudLibrary/pcl/releases/download/pcl-1.14.1/PCL-1.14.1-AllInOne-msvc2022-win64.exe"
        Write-Host "Downloading PCL 1.14.1..."
        Invoke-WebRequest -Uri $url -OutFile "PCL-installer.exe" -TimeoutSec 600
        Write-Host "Download complete. Size: $((Get-Item 'PCL-installer.exe').Length / 1MB) MB"
      shell: pwsh

    - name: Install PCL 1.14.1
      run: |
        Write-Host "Installing PCL 1.14.1 to C:\PCL ..."
        $proc = Start-Process -Wait -PassThru -FilePath ".\PCL-installer.exe" -ArgumentList "/S /D=C:\PCL"
        Write-Host "Exit code: $($proc.ExitCode)"
        if (Test-Path "C:\PCL\include") {
          Write-Host "PCL installed successfully"
          Get-ChildItem "C:\PCL" | Select-Object Name
        } else {
          Write-Error "PCL installation failed - include directory not found"
          exit 1
        }
      shell: pwsh

    - name: Discover PCL structure
      run: |
        $pclBase = "C:\PCL"

        # Discover versioned subdirectories
        $pclInclude = (Get-ChildItem "$pclBase\include" -Directory | Select-Object -First 1).FullName
        $vtkInclude  = (Get-ChildItem "$pclBase\3rdParty\VTK\include"  -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        $boostInclude= (Get-ChildItem "$pclBase\3rdParty\Boost\include" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        $eigenInclude= "$pclBase\3rdParty\Eigen\eigen3"
        $flannInclude= "$pclBase\3rdParty\FLANN\include"

        Write-Host "PCL include   : $pclInclude"
        Write-Host "VTK include   : $vtkInclude"
        Write-Host "Boost include : $boostInclude"
        Write-Host "Eigen include : $eigenInclude"
        Write-Host "FLANN include : $flannInclude"

        # Lib directories
        $pclLib  = "$pclBase\lib"
        $vtkLib  = "$pclBase\3rdParty\VTK\lib"
        $boostLib= "$pclBase\3rdParty\Boost\lib"
        $flannLib= "$pclBase\3rdParty\FLANN\lib"

        # --- PCL release lib files ---
        $pclLibFiles = (Get-ChildItem $pclLib -Filter "pcl_*_release.lib" |
                        ForEach-Object { $_.Name }) -join ";"
        Write-Host "PCL libs: $pclLibFiles"

        # --- Required VTK lib files (discover version suffix dynamically) ---
        $vtkModules = @(
          "vtkCommonCore", "vtkCommonDataModel", "vtkCommonExecutionModel",
          "vtkCommonMath", "vtkCommonMisc", "vtkCommonSystem", "vtkCommonTransforms",
          "vtkIOCore", "vtkIOGeometry", "vtksys", "vtkzlib", "vtklz4"
        )
        $vtkLibFiles = @()
        foreach ($mod in $vtkModules) {
          $found = Get-ChildItem $vtkLib -Filter "${mod}-*.lib" -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -notlike "*-gd-*" -and $_.Name -notlike "*d.lib" } |
                   Select-Object -First 1
          if ($found) { $vtkLibFiles += $found.Name }
        }
        $vtkLibStr = $vtkLibFiles -join ";"
        Write-Host "VTK libs: $vtkLibStr"

        # Persist for next step
        "PCL_INCLUDE=$pclInclude"   | Out-File -Append $env:GITHUB_ENV
        "VTK_INCLUDE=$vtkInclude"   | Out-File -Append $env:GITHUB_ENV
        "BOOST_INCLUDE=$boostInclude"| Out-File -Append $env:GITHUB_ENV
        "EIGEN_INCLUDE=$eigenInclude"| Out-File -Append $env:GITHUB_ENV
        "FLANN_INCLUDE=$flannInclude"| Out-File -Append $env:GITHUB_ENV
        "PCL_LIB=$pclLib"           | Out-File -Append $env:GITHUB_ENV
        "VTK_LIB=$vtkLib"           | Out-File -Append $env:GITHUB_ENV
        "BOOST_LIB=$boostLib"       | Out-File -Append $env:GITHUB_ENV
        "FLANN_LIB=$flannLib"       | Out-File -Append $env:GITHUB_ENV
        "PCL_LIB_FILES=$pclLibFiles"| Out-File -Append $env:GITHUB_ENV
        "VTK_LIB_FILES=$vtkLibStr"  | Out-File -Append $env:GITHUB_ENV
      shell: pwsh

    - name: Generate PclRelease.props
      run: |
        $pclInclude  = $env:PCL_INCLUDE
        $vtkInclude  = $env:VTK_INCLUDE
        $boostInclude= $env:BOOST_INCLUDE
        $eigenInclude= $env:EIGEN_INCLUDE
        $flannInclude= $env:FLANN_INCLUDE
        $pclLib      = $env:PCL_LIB
        $vtkLib      = $env:VTK_LIB
        $boostLib    = $env:BOOST_LIB
        $flannLib    = $env:FLANN_LIB
        $pclLibFiles = $env:PCL_LIB_FILES
        $vtkLibFiles = $env:VTK_LIB_FILES

        $props = @"
<?xml version="1.0" encoding="utf-8"?>
<!-- Auto-generated by GitHub Actions for PCL 1.14.1 build. -->
<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
  <ImportGroup Label="PropertySheets" />
  <PropertyGroup Label="UserMacros" />
  <ItemDefinitionGroup>
    <ClCompile>
      <AdditionalIncludeDirectories>$pclInclude;$vtkInclude;$boostInclude;$eigenInclude;$flannInclude;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
      <PreprocessorDefinitions>FLANN_STATIC;_USE_MATH_DEFINES;%(PreprocessorDefinitions)</PreprocessorDefinitions>
    </ClCompile>
    <Link>
      <AdditionalLibraryDirectories>$pclLib;$vtkLib;$boostLib;$flannLib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
      <AdditionalDependencies>$pclLibFiles;$vtkLibFiles;%(AdditionalDependencies)</AdditionalDependencies>
    </Link>
  </ItemDefinitionGroup>
  <ItemGroup />
</Project>
"@
        $props | Out-File -FilePath "src\PclSharpWrapper\PclRelease.props" -Encoding UTF8
        Write-Host "Generated PclRelease.props:"
        Get-Content "src\PclSharpWrapper\PclRelease.props"
      shell: pwsh

    - name: Build solution (Release|x64)
      run: |
        msbuild "src\PclSharpWrapper\PclSharpWrapper.sln" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /m `
          /v:minimal `
          /bl:build.binlog
      shell: pwsh

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.binlog

    - name: Collect runtime DLLs into depend/x64
      run: |
        $pclBase = "C:\PCL"
        $destDir = "depend\x64"

        # PCL runtime DLLs
        Write-Host "Copying PCL DLLs..."
        Get-ChildItem "$pclBase\bin" -Filter "pcl_*_release.dll" |
          Copy-Item -Destination $destDir -Force

        # VTK runtime DLLs
        Write-Host "Copying VTK DLLs..."
        $vtkModules = @(
          "vtkCommonCore", "vtkCommonDataModel", "vtkCommonExecutionModel",
          "vtkCommonMath", "vtkCommonMisc", "vtkCommonSystem", "vtkCommonTransforms",
          "vtkIOCore", "vtkIOGeometry", "vtksys", "vtkzlib", "vtklz4"
        )
        foreach ($mod in $vtkModules) {
          $found = Get-ChildItem "$pclBase\3rdParty\VTK\bin" -Filter "${mod}-*.dll" -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -notlike "*-gd-*" } |
                   Select-Object -First 1
          if ($found) {
            Copy-Item $found.FullName -Destination $destDir -Force
            Write-Host "  Copied $($found.Name)"
          }
        }

        Write-Host "`nRuntime DLLs in depend/x64:"
        Get-ChildItem $destDir | Sort-Object Name | Select-Object Name
      shell: pwsh

    - name: Upload DLL artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PclCSharp-DLLs-PCL1.14.1
        path: |
          bin/*.dll
          bin/*.pdb
          depend/x64/*.dll
