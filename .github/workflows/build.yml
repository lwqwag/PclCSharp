name: Build PclCSharp with PCL 1.14.1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Ninja
      run: choco install ninja -y
      shell: pwsh

    - name: Download PCL 1.14.1 AllInOne installer
      run: |
        $url = "https://github.com/PointCloudLibrary/pcl/releases/download/pcl-1.14.1/PCL-1.14.1-AllInOne-msvc2022-win64.exe"
        Write-Host "Downloading PCL 1.14.1..."
        Invoke-WebRequest -Uri $url -OutFile "PCL-installer.exe" -TimeoutSec 600
        Write-Host "Download complete. Size: $((Get-Item 'PCL-installer.exe').Length / 1MB) MB"
      shell: pwsh

    - name: Disable UAC interactive prompts
      run: |
        # Prevent the NSIS-based PCL installer from showing a UAC elevation dialog
        # that would cause the pipeline to hang in a non-interactive CI session.
        Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' `
          -Name 'ConsentPromptBehaviorAdmin' -Value 0
        Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' `
          -Name 'EnableLUA' -Value 0
      shell: pwsh

    - name: Install PCL 1.14.1
      run: |
        Write-Host "Installing PCL 1.14.1 to C:\PCL ..."
        $proc = Start-Process -Wait -PassThru -FilePath ".\PCL-installer.exe" `
          -ArgumentList "/S /NCRC /D=C:\PCL" -Verb RunAs
        Write-Host "Exit code: $($proc.ExitCode)"
        if (Test-Path "C:\PCL\include") {
          Write-Host "PCL installed successfully"
          Get-ChildItem "C:\PCL" | Select-Object Name
        } else {
          Write-Error "PCL installation failed - include directory not found"
          exit 1
        }
      shell: pwsh

    - name: Locate PCL cmake config and expose PCL_DIR
      run: |
        $pclBase = "C:\PCL"

        # The AllInOne installer places PCLConfig.cmake under cmake\ or lib\cmake\pcl\
        $candidates = @(
          "$pclBase\cmake",
          "$pclBase\lib\cmake\pcl"
        )
        $pclDir = $null
        foreach ($c in $candidates) {
          if (Test-Path "$c\PCLConfig.cmake") { $pclDir = $c; break }
        }
        if (-not $pclDir) {
          # Fallback: search recursively
          $found = Get-ChildItem $pclBase -Recurse -Filter "PCLConfig.cmake" -ErrorAction SilentlyContinue |
                   Select-Object -First 1
          if ($found) { $pclDir = $found.DirectoryName }
        }
        if (-not $pclDir) {
          Write-Error "Could not locate PCLConfig.cmake under $pclBase"
          exit 1
        }
        Write-Host "PCL_DIR = $pclDir"
        "PCL_DIR=$pclDir" | Out-File -Append $env:GITHUB_ENV
        "PCL_ROOT=$pclBase" | Out-File -Append $env:GITHUB_ENV
      shell: pwsh

    - name: Configure C++ projects with CMake
      run: |
        cmake -S . -B build `
          -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          "-DPCL_DIR=$env:PCL_DIR" `
          "-DPCL_ROOT=$env:PCL_ROOT"
      shell: pwsh

    - name: Build C++ DLLs with CMake
      run: |
        cmake --build build --config Release --parallel
      shell: pwsh

    - name: Upload CMake build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cmake-build-log
        path: build/

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build .NET solution
      run: |
        msbuild "src\PclSharpWrapper\PclSharpWrapper.sln" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /m `
          /v:minimal `
          /bl:msbuild.binlog
      shell: pwsh

    - name: Upload MSBuild log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: msbuild-log
        path: msbuild.binlog

    - name: Collect runtime DLLs into depend/x64
      run: |
        $pclBase = "C:\PCL"
        $destDir = "depend\x64"

        # PCL runtime DLLs
        Write-Host "Copying PCL DLLs..."
        Get-ChildItem "$pclBase\bin" -Filter "pcl_*_release.dll" |
          Copy-Item -Destination $destDir -Force

        # VTK runtime DLLs
        Write-Host "Copying VTK DLLs..."
        $vtkModules = @(
          "vtkCommonCore", "vtkCommonDataModel", "vtkCommonExecutionModel",
          "vtkCommonMath", "vtkCommonMisc", "vtkCommonSystem", "vtkCommonTransforms",
          "vtkIOCore", "vtkIOGeometry", "vtksys", "vtkzlib", "vtklz4"
        )
        foreach ($mod in $vtkModules) {
          $found = Get-ChildItem "$pclBase\3rdParty\VTK\bin" -Filter "${mod}-*.dll" -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -notlike "*-gd-*" } |
                   Select-Object -First 1
          if ($found) {
            Copy-Item $found.FullName -Destination $destDir -Force
            Write-Host "  Copied $($found.Name)"
          }
        }

        Write-Host "`nRuntime DLLs in depend/x64:"
        Get-ChildItem $destDir | Sort-Object Name | Select-Object Name
      shell: pwsh

    - name: Upload DLL artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PclCSharp-DLLs-PCL1.14.1
        path: |
          bin/*.dll
          bin/*.pdb
          depend/x64/*.dll
